<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!--
    PCでのシフト編集を中心とした画面ですが、
    タブレットやスマートフォンでも横幅に合わせて表示します。
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>基本シフト表</title>

  <!-- 基本シフト表専用のデザイン -->
  <link rel="stylesheet" href="shift-week.css">
</head>

<body>
  <!-- =========================================================
       画面上部
  ========================================================== -->
  <header class="app-header">
    <div class="header-title">
      <div class="app-name">訪問ケアぷーどる</div>
      <h1>基本シフト表</h1>
    </div>

    <div class="header-actions">
      <!-- GASから対象週の最新データを再取得します。 -->
      <button
        id="reloadButton"
        class="secondary-button"
        type="button"
      >
        再読み込み
      </button>

      <!-- 規定値から対象週の基本シフトを初回作成します。 -->
      <button
        id="createButton"
        class="primary-button"
        type="button"
      >
        初回作成
      </button>

      <!-- シフト規定値画面へ移動します。 -->
      <a
        class="nav-link"
        href="./shift-master-v2.html"
      >
        シフト規定値
      </a>
    </div>
  </header>

  <main class="page">
    <!-- =======================================================
         対象週の選択
    ======================================================== -->
    <section class="control-card">
      <div class="week-navigation">
        <div class="week-side week-side-left">
          <button
            id="previousWeekButton"
            class="secondary-button large-week-button"
            type="button"
          >
            前の週
          </button>
        </div>

        <div class="week-center">
          <label for="weekMonday">
            対象週の月曜日
          </label>

          <div class="week-input-row">
            <input
              type="date"
              id="weekMonday"
            >

            <button
              id="currentWeekButton"
              class="secondary-button current-week-button"
              type="button"
            >
              今週
            </button>
          </div>

          <strong id="weekRange"></strong>
        </div>

        <div class="week-side week-side-right">
          <button
            id="nextWeekButton"
            class="secondary-button large-week-button"
            type="button"
          >
            次の週
          </button>
        </div>
      </div>
    </section>

    <!-- =======================================================
         件数・メッセージ・ブラウザ保存状況
    ======================================================== -->
    <section class="summary-row">
      <div class="summary-left">
        <div class="record-summary">
          <strong id="recordCount">0件</strong>
          <span>の基本シフト</span>
        </div>

        <div
          id="messageArea"
          class="message-area hidden"
          role="status"
          aria-live="polite"
        ></div>
      </div>

      <div id="cacheStatus" class="cache-status"></div>
    </section>

    <!-- =======================================================
         基本シフト一覧

         利用者名をクリックすると、その行の直下に
         スマホ表示用の詳細入力欄を開きます。
    ======================================================== -->
    <section class="table-card">
      <div class="table-scroll">
        <table class="shift-table">
          <!--
            列ごとの幅を明確にするためcolgroupを使用します。
            担当者4列は、すべて同じ幅です。
          -->
          <colgroup>
            <col class="col-user">
            <col class="col-date">
            <col class="col-weekday">
            <col class="col-time">
            <col class="col-time">
            <col class="col-service">
            <col class="col-vehicle">
            <col class="col-content">
            <col class="col-note">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-status">
            <col class="col-publish">
          </colgroup>

          <thead>
            <tr>
              <th>利用者</th>
              <th>日付</th>
              <th>曜日</th>
              <th>開始</th>
              <th>終了</th>
              <th>サービス</th>
              <th>運送車両</th>
              <th>内容</th>
              <th>備考</th>
              <th>主担当</th>
              <th>副担当</th>
              <th>担当3</th>
              <th>担当4</th>
              <th>状態</th>
              <th>公開状態</th>
            </tr>
          </thead>

          <tbody id="shiftWeekBody"></tbody>
        </table>
      </div>

      <div id="emptyArea" class="empty-area hidden">
        この週の基本シフトはまだありません。
      </div>
    </section>
  </main>

  <!-- 基本シフト表専用の処理 -->
  <script src="shift-week.js"></script>
</body>
</html>
