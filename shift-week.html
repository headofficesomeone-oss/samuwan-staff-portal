<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>基本シフト表</title><link rel="stylesheet" href="shift-week.css"></head><body>
<header class="app-header"><div><div class="app-name">訪問ケアぷーどる</div><h1>基本シフト表</h1></div><a class="nav-link" href="./shift-master-v2.html">シフト規定値へ</a></header>
<main class="page"><section class="control-card"><div class="week-navigation"><button id="previousWeekButton">前の週</button><div class="week-display"><label for="weekMonday">対象週の月曜日</label><input type="date" id="weekMonday"><strong id="weekRange"></strong></div><button id="nextWeekButton">次の週</button></div><div class="action-row"><button id="currentWeekButton" class="secondary-button">今週</button><button id="reloadButton" class="secondary-button">再読み込み</button><button id="createButton" class="primary-button">規定値から初回作成</button></div><div id="messageArea" class="message-area hidden"></div></section>
<section class="summary-row"><div><strong id="recordCount">0件</strong><span>の基本シフト</span></div></section>
<section class="table-card"><div class="table-scroll"><table><thead><tr><th>利用者</th><th>日付</th><th>曜日</th><th>開始</th><th>終了</th><th>サービス</th><th>有償運送車両</th><th>内容</th><th>備考</th><th>主担当</th><th>副担当</th><th>担当3</th><th>担当4</th><th>状態</th><th>公開状態</th></tr></thead><tbody id="shiftWeekBody"></tbody></table></div><div id="emptyArea" class="empty-area hidden">この週の基本シフトはまだありません。</div></section></main>
<script src="shift-week.js"></script></body></html>
