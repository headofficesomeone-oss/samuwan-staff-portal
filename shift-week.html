<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>基本シフト表</title>

  <link rel="stylesheet" href="shift-week.css">
</head>

<body>
  <!-- =========================================================
       画面上部
       ========================================================= -->
  <header class="app-header">
    <div class="header-title">
      <div class="app-name">訪問ケアぷーどる</div>
      <h1>基本シフト表</h1>
    </div>

    <div class="header-actions">
      <button
        id="reloadButton"
        class="secondary-button"
        type="button"
      >
        再読み込み
      </button>

      <button
        id="createButton"
        class="primary-button"
        type="button"
      >
        初回作成
      </button>

      <a
        class="nav-link"
        href="./shift-master-v2.html"
      >
        シフト規定値
      </a>
    </div>
  </header>

  <main class="page">
    <!-- =======================================================
         対象週の選択
         ======================================================= -->
    <section class="control-card">
      <div class="week-navigation">
        <div class="week-side week-side-left">
          <button
            id="previousWeekButton"
            class="secondary-button large-week-button"
            type="button"
          >
            前の週
          </button>
        </div>

        <div class="week-center">
          <label for="weekMonday">対象週の月曜日</label>

          <div class="week-input-row">
            <input id="weekMonday" type="date">

            <button
              id="currentWeekButton"
              class="secondary-button current-week-button"
              type="button"
            >
              今週
            </button>
          </div>

          <strong id="weekRange"></strong>
        </div>

        <div class="week-side week-side-right">
          <button
            id="nextWeekButton"
            class="secondary-button large-week-button"
            type="button"
          >
            次の週
          </button>
        </div>
      </div>
    </section>

    <!-- =======================================================
         件数・処理メッセージ・端末保存状況
         ======================================================= -->
    <section class="summary-row">
      <div class="summary-left">
        <div class="record-summary">
          <strong id="recordCount">0件</strong>
          <span>の基本シフト</span>
        </div>

        <div class="filter-group">
          <div class="staff-filter-area">
            <label for="staffFilter">担当者</label>

            <select id="staffFilter">
              <option value="">全員</option>
            </select>
          </div>

          <div class="weekday-filter-area">
            <label for="weekdayFilter">曜日</label>

            <select id="weekdayFilter">
              <option value="">全曜日</option>
              <option value="月">月</option>
              <option value="火">火</option>
              <option value="水">水</option>
              <option value="木">木</option>
              <option value="金">金</option>
              <option value="土">土</option>
              <option value="日">日</option>
            </select>
          </div>
        </div>

        <div
          id="messageArea"
          class="message-area hidden"
          role="status"
        ></div>
      </div>

      <div id="cacheStatus" class="cache-status"></div>
    </section>

    <!-- =======================================================
         基本シフト一覧
         ======================================================= -->
    <section class="table-card">

      <!-- 見出しの上に表示する横スクロールバー -->
      <div id="topScroll" class="top-scroll" aria-label="表の横スクロール">
        <div id="topScrollInner" class="top-scroll-inner"></div>
      </div>

      <!-- 表本体のスクロール領域 -->
      <div id="tableScroll" class="table-scroll">
        <table class="shift-table">
          <colgroup>
            <col class="col-user">
            <col class="col-date">
            <col class="col-weekday">
            <col class="col-time">
            <col class="col-time">
            <col class="col-service">
            <col class="col-vehicle">
            <col class="col-content">
            <col class="col-destination">
            <col class="col-note">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-staff">
            <col class="col-status">
            <col class="col-publish">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="user-heading">
                  <span>利用者</span>

                  <button
                    id="instructionToggleButton"
                    class="instruction-toggle-button"
                    type="button"
                    aria-pressed="false"
                  >
                    指示
                  </button>
                </div>
              </th>
              <th class="center-heading">日付</th>
              <th class="center-heading">曜日</th>
              <th class="center-heading">開始</th>
              <th class="center-heading">終了</th>
              <th class="center-heading">サービス</th>
              <th class="center-heading">運送車両</th>
              <th>支援内容</th>
              <th>行き先</th>
              <th>備考</th>
              <th>主担当</th>
              <th>副担当</th>
              <th>担当3</th>
              <th>担当4</th>
              <th class="center-heading">状態</th>
              <th class="center-heading">公開状態</th>
            </tr>
          </thead>

          <tbody id="shiftWeekBody"></tbody>
        </table>
      </div>

      <div id="emptyArea" class="empty-area hidden">
        この週の基本シフトはまだありません。
      </div>
    </section>
  </main>

  <script src="shift-week.js"></script>
</body>
</html>
