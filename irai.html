<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利用依頼受付</title>
  <link rel="stylesheet" href="irai.css">
</head>
<body>
  <header class="app-header">
    <div class="logo">
      <div class="logo-mark">✿</div>
      <div>訪問ケア<br>ぷーどる</div>
    </div>
    <div class="page-title">利用依頼受付</div>
    <button class="help-button" type="button" onclick="backToPortal()">戻る</button>
  </header>

  <main class="page">
    <section class="card">
      <div id="shiftRequestArea">
        <div class="section-title">
          <div class="icon-circle">📅</div>
          <div>
            <h1>利用依頼受付</h1>
            <p id="iraiUserName"></p>
            <p>利用者の支援予定を登録します。</p>
          </div>
        </div>

        <form id="shiftRequestForm">
          <div class="form-group">
            <label>利用者<span class="required">必須</span></label>
            <select id="clientName" required>
              <option value="">利用者を選択してください</option>
            </select>
          </div>

          <div class="form-group">
            <label>区分<span class="required">必須</span></label>
            <select id="requestType" required>
              <option value="">区分を選択してください</option>
              <option>通院（通院）</option>
              <option>通院（同行）</option>
              <option>外出（同行）</option>
              <option>外出（移動）</option>
              <option>担当者会議</option>
              <option>支援ｷｬﾝｾﾙ</option>
              <option>登録取消</option>
            </select>
          </div>

          <div class="form-group">
            <label>依頼方法</label>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="requestMode" value="single" checked onchange="changeRequestMode()">
                1日だけ
              </label>
              <label class="radio-card">
                <input type="radio" name="requestMode" value="repeat" onchange="changeRequestMode()">
                期間と曜日でまとめて依頼
              </label>
            </div>
          </div>

          <div id="singleDateArea">
            <div class="form-group">
              <label>日時<span class="required">必須</span></label>
              <input type="date" id="requestDate">
            </div>
          </div>

          <div id="repeatDateArea" class="hidden">
            <div class="time-row">
              <div class="form-group">
                <label>開始日<span class="required">必須</span></label>
                <input type="date" id="periodStartDate">
              </div>
              <div class="form-group">
                <label>終了日<span class="required">必須</span></label>
                <input type="date" id="periodEndDate">
              </div>
            </div>

            <div class="form-group">
              <label>曜日<span class="required">必須</span></label>
              <div class="weekday-grid">
                <label><input type="checkbox" name="weekday" value="1">月</label>
                <label><input type="checkbox" name="weekday" value="2">火</label>
                <label><input type="checkbox" name="weekday" value="3">水</label>
                <label><input type="checkbox" name="weekday" value="4">木</label>
                <label><input type="checkbox" name="weekday" value="5">金</label>
                <label><input type="checkbox" name="weekday" value="6">土</label>
                <label><input type="checkbox" name="weekday" value="0">日</label>
              </div>
            </div>
          </div>

          <div class="time-row">
            <div class="form-group">
              <label>開始時刻<span class="required">必須</span></label>
              <input type="time" id="startTime" required>
            </div>
            <div class="form-group">
              <label>終了予定</label>
              <input type="time" id="endTime">
            </div>
          </div>

          <div class="form-group">
            <label>行き先場所</label>
            <input id="destination" placeholder="例：○○病院">
          </div>
          <div class="form-group">
            <label>待合せ場所</label>
            <input id="meetingPlace" placeholder="例：自宅玄関">
          </div>
          <div class="form-group">
            <label>移動手段</label>
            <input id="transportation" placeholder="例：徒歩、電車、有償運送">
          </div>
          <div class="form-group">
            <label>特記事項</label>
            <textarea id="specialNotes" rows="5"></textarea>
          </div>

          <button class="main-button" type="submit">依頼内容を確認する</button>
          <button class="back-button" type="button" onclick="backToPortal()">ポータルへ戻る</button>
        </form>
      </div>

      <div id="shiftConfirmArea" class="hidden">
        <div class="section-title">
          <div class="icon-circle">✅</div>
          <div>
            <h1>依頼内容の確認</h1>
            <p>登録前に、基本シフトと依頼情報の重複も確認します。</p>
          </div>
        </div>
        <div id="shiftConfirmContent" class="confirm-box"></div>
        <button id="submitShiftRequestButton" class="main-button" onclick="checkAndSubmitShiftRequest()">重複を確認して登録する</button>
        <button class="back-button" onclick="backToShiftRequest()">入力画面へ戻る</button>
      </div>

      <div id="shiftConflictArea" class="hidden">
        <div class="section-title warning-title">
          <div class="icon-circle warning-icon">⚠</div>
          <div>
            <h1>重複・近接予定の確認</h1>
            <p>既存予定は自動変更しません。内容を比較して登録方法を選んでください。</p>
          </div>
        </div>

        <div id="shiftConflictSummary" class="warning-box"></div>
        <div id="shiftConflictList" class="conflict-list"></div>

        <div class="form-group">
          <label>登録方法<span class="required">必須</span></label>
          <div class="conflict-choice-list">
            <label class="conflict-choice-card">
              <input type="radio" name="conflictAction" value="separate">
              <span>
                <strong>別の依頼として登録する</strong>
                <small>既存予定は変更せず、サ責の確認対象として登録します。</small>
              </span>
            </label>
            <label class="conflict-choice-card">
              <input type="radio" name="conflictAction" value="change">
              <span>
                <strong>選択した基本シフトの変更依頼として登録する</strong>
                <small>既存予定は直接変更せず、関連シフトＩＤを付けて登録します。</small>
              </span>
            </label>
          </div>
        </div>

        <button id="registerConflictButton" class="main-button" onclick="registerAfterConflictChoice()">選択した内容で登録する</button>
        <button class="back-button" onclick="backToConfirmFromConflict()">確認画面へ戻る</button>
        <button class="back-button" onclick="backToShiftRequestFromConflict()">登録せず入力画面へ戻る</button>
      </div>

      <div id="shiftCompleteArea" class="complete-area hidden">
        <div class="complete-icon">✓</div>
        <h2>利用依頼を登録しました</h2>
        <p id="shiftCompleteMessage">依頼内容を登録しました。</p>
        <button class="main-button" onclick="continueShiftRequest()">続けて依頼する</button>
        <button class="back-button" onclick="backToPortal()">ポータルへ戻る</button>
      </div>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="irai.js"></script>
</body>
</html>
