<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト規定値 登録・編集</title>
  <link rel="stylesheet" href="shift-master-style.css">
</head>

<body>

<header class="page-header">
  <div>
    <h1>シフト規定値 登録・編集</h1>
    <p>毎週の基本となる支援予定を管理します</p>
  </div>

  <div class="header-buttons">
    <button type="button" class="copy-button">コピーして新規作成</button>
    <button type="button" class="new-button">＋ 新しい規定値</button>
  </div>
</header>

<main class="main-layout">

  <section class="panel list-panel">
    <div class="panel-title">規定値一覧</div>

    <div class="search-area">
      <div class="search-grid">
        <select id="filterUser">
          <option value="">すべての利用者</option>
        </select>

        <select id="filterWeekday">
          <option value="">すべての曜日</option>
          <option value="月">月</option>
          <option value="火">火</option>
          <option value="水">水</option>
          <option value="木">木</option>
          <option value="金">金</option>
          <option value="土">土</option>
          <option value="日">日</option>
        </select>
      </div>
    </div>

    <div class="shift-list"></div>
  </section>

  <section class="panel edit-panel">

    <div class="panel-title title-row">
      <span>規定値の内容</span>
      <span class="sub-title">基本情報</span>
    </div>

    <div class="edit-area">

      <div class="section">
        <div class="form-grid basic-grid">

          <div class="field id-field">
            <label>規定値ID</label>
            <input id="masterId" class="id-box" readonly>
          </div>

          <div class="field id-field">
            <label>履歴ID</label>
            <input id="historyId" class="id-box" readonly>
          </div>

          <div class="field user-field">
            <label>利用者※</label>
            <select id="userSelect">
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="field date-field">
            <label>適用開始日</label>
            <input id="startDate" type="date">
          </div>

          <div class="field date-field">
            <label>適用終了日</label>
            <input id="endDate" type="date">
          </div>

          <div class="field weekday-field">
            <label>曜日※</label>
            <select id="weekdaySelect">
              <option value="">選択</option>
              <option value="月">月</option>
              <option value="火">火</option>
              <option value="水">水</option>
              <option value="木">木</option>
              <option value="金">金</option>
              <option value="土">土</option>
              <option value="日">日</option>
            </select>
          </div>

          <div class="field time-field">
            <label>開始※</label>
            <input id="startTime" type="time">
          </div>

          <div class="field time-field">
            <label>終了※</label>
            <input id="endTime" type="time">
          </div>

          <div class="field people-field">
            <label>人数</label>
            <select id="peopleSelect">
              <option value="1人">1人</option>
              <option value="2人">2人</option>
              <option value="3人">3人</option>
              <option value="4人">4人</option>
            </select>
          </div>

          <div class="field service-field">
            <label>サービス※</label>
            <select id="serviceSelect">
              <option value="">選択してください</option>
              <option value="居宅介護">居宅介護</option>
              <option value="重度訪問">重度訪問</option>
              <option value="同行援護">同行援護</option>
              <option value="訪問介護">訪問介護</option>
            </select>
          </div>

          <div class="field week-field">
            <label>週P</label>
            <div class="week-row">
              <button type="button" class="week-button" onclick="toggleWeekPanel()">設定</button>
              <input id="weekPatternText" class="week-pattern-box" readonly>
            </div>
          </div>

          <div class="field change-field">
            <label>交代</label>
            <select id="changeType">
              <option value="通常">通常</option>
              <option value="交代">交代</option>
            </select>
          </div>

          <div id="weekPanel" class="week-panel hidden">
            <label><input type="checkbox" value="毎" onchange="updateWeekPattern()"> 毎週</label>
            <label><input type="checkbox" value="1" onchange="updateWeekPattern()"> 第1</label>
            <label><input type="checkbox" value="2" onchange="updateWeekPattern()"> 第2</label>
            <label><input type="checkbox" value="3" onchange="updateWeekPattern()"> 第3</label>
            <label><input type="checkbox" value="4" onchange="updateWeekPattern()"> 第4</label>
            <label><input type="checkbox" value="5" onchange="updateWeekPattern()"> 第5</label>
            <label><input type="checkbox" value="隔A" onchange="updateWeekPattern()"> 隔A</label>
            <label><input type="checkbox" value="隔B" onchange="updateWeekPattern()"> 隔B</label>
          </div>

          <div class="field staff-field staff-row-start">
            <label>主担当</label>
            <input id="staff1">
          </div>

          <div class="field staff-field">
            <label>副担当</label>
            <input id="staff2">
          </div>

          <div class="field staff-field">
            <label>担当3</label>
            <input id="staff3">
          </div>

          <div class="field staff-field">
            <label>担当4</label>
            <input id="staff4">
          </div>

        </div>
      </div>

      <div class="section">
        <div class="section-heading">支援内容</div>

        <div class="form-grid support-grid">

          <div class="field support-main">
            <label>支援内容</label>
            <textarea id="support"></textarea>
          </div>

          <div class="field place-field">
            <label>行き先</label>
            <input id="destination">
          </div>

          <div class="field place-field">
            <label>待合せ</label>
            <input id="meeting">
          </div>

          <div class="field move-field">
            <label>移動手段</label>
            <input id="transport">
          </div>

          <div class="field memo-field">
            <label>備考</label>
            <textarea id="note"></textarea>
          </div>

        </div>
      </div>

      <div class="action-area">
        <button type="button" class="secondary-button">変更を取り消す</button>
        <button type="button" class="save-button">この内容で保存</button>
      </div>

    </div>
  </section>

</main>

<!-- pages redeploy -->
<script src="shift-master-app.js"></script>

</body>
</html>
```
